<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VENTIX.ID - Pembayaran QRIS</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0b0b0b;
color:#fff;
padding:20px;
min-height:100vh;
}

.container{
max-width:700px;
margin:auto;
}

.header{
text-align:center;
margin-bottom:25px;
}

.header h1{
font-size:30px;
font-weight:800;
}

.header p{
color:#aaa;
margin-top:5px;
}

.card{
background:#161616;
border:1px solid rgba(212,175,55,.25);
border-radius:24px;
padding:25px;
margin-bottom:20px;
box-shadow:
0 10px 35px rgba(0,0,0,.4);
}

.order-id{
font-size:15px;
color:#aaa;
margin-bottom:10px;
}

.order-number{
font-size:18px;
font-weight:700;
color:#D4AF37;
}

.total-label{
font-size:14px;
color:#aaa;
margin-top:15px;
}

.total{
font-size:34px;
font-weight:800;
color:#fff;
margin-top:5px;
}

.qris-box{
text-align:center;
}

.qris-box img{
width:100%;
max-width:320px;
background:#fff;
padding:15px;
border-radius:20px;
}

.upload-box{
border:2px dashed rgba(212,175,55,.4);
border-radius:20px;
padding:30px;
text-align:center;
cursor:pointer;
transition:.3s;
}

.upload-box:hover{
border-color:#D4AF37;
background:rgba(212,175,55,.05);
}

.upload-icon{
font-size:40px;
margin-bottom:10px;
}

.preview{
display:none;
margin-top:15px;
text-align:center;
}

.preview img{
width:100%;
max-width:250px;
border-radius:15px;
}

.success{
display:none;
margin-top:15px;
padding:15px;
background:rgba(34,197,94,.12);
border:1px solid rgba(34,197,94,.4);
border-radius:15px;
color:#22c55e;
font-weight:700;
}

.btn{
width:100%;
padding:18px;
border:none;
border-radius:16px;
background:#D4AF37;
color:#000;
font-size:17px;
font-weight:700;
cursor:pointer;
margin-top:20px;
}

.btn:disabled{
opacity:.4;
cursor:not-allowed;
}

.footer-note{
text-align:center;
margin-top:20px;
color:#777;
font-size:13px;
}

</style>
</head>
<body>

<div class="container">

<div class="header">
<h1>Pembayaran QRIS</h1>
<p>Selesaikan pembayaran untuk melanjutkan</p>
</div>

<div class="card">

<div class="order-id">
ORDER ID
</div>

<div id="orderId" class="order-number">
-
</div>

<div class="total-label">
TOTAL PEMBAYARAN
</div>

<div id="totalBayar" class="total">
Rp 0
</div>

</div>

<div class="card qris-box">

<h3 style="margin-bottom:20px;">
Scan QRIS
</h3>

<!-- GANTI DENGAN QRIS KAMU -->
<img src="qris.png" alt="QRIS">

</div>

<div class="card">

<label for="buktiFile">

<div class="upload-box">

<div class="upload-icon">
☁️
</div>

<h3>Upload Bukti Pembayaran</h3>

<p style="color:#aaa;margin-top:8px;">
PNG, JPG, JPEG
</p>

</div>

</label>

<input
type="file"
id="buktiFile"
accept="image/*"
hidden>

<div class="preview" id="preview">
<img id="previewImg">
</div>

<div class="success" id="successBox">
✓ Bukti pembayaran berhasil dipilih
</div>

<button
id="submitBtn"
class="btn"
disabled>
KIRIM BUKTI PEMBAYARAN
</button>

</div>

<div class="footer-note">
VENTIX.ID Secure Payment
</div>

</div>

<script>

const orderId =
localStorage.getItem('orderId') ||
'VTX-UNKNOWN';

const totalBayar =
localStorage.getItem('totalBayar') ||
'0';

document.getElementById('orderId').textContent =
orderId;

document.getElementById('totalBayar').textContent =
'Rp ' +
Number(totalBayar)
.toLocaleString('id-ID');

const fileInput =
document.getElementById('buktiFile');

const preview =
document.getElementById('preview');

const previewImg =
document.getElementById('previewImg');

const successBox =
document.getElementById('successBox');

const submitBtn =
document.getElementById('submitBtn');

fileInput.addEventListener('change', function(){

const file =
this.files[0];

if(!file) return;

const reader =
new FileReader();

reader.onload = function(e){

preview.style.display='block';

previewImg.src =
e.target.result;

successBox.style.display='block';

submitBtn.disabled=false;

localStorage.setItem(
'buktiPembayaran',
e.target.result
);

};

reader.readAsDataURL(file);

});

submitBtn.addEventListener('click',()=>{

submitBtn.innerHTML =
'MENGIRIM...';

submitBtn.disabled=true;

setTimeout(()=>{

window.location.href =
'status.html';

},1500);

});

</script>

</body>
</html>
